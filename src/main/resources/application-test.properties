# ==========================================
# DATABÁZE H2 (In-Memory)
# ==========================================
# Připojovací řetězec - 'mem:testdb' znamená, že žije pouze v paměti (RAM)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==========================================
# HIBERNATE & JPA
# ==========================================
# Dialekt pro H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'create-drop' je pro testy perfektní: před testem tabulky vytvoří, po ukončení aplikace je smaže
spring.jpa.hibernate.ddl-auto=create-drop
# Zobrazení SQL dotazů v logu (hodí se pro ladění testů)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# APLIKAČNÍ NASTAVENÍ (Ochrana reálných souborů)
# ==========================================
# Zabrání tomu, aby testy ukládaly soubory do tvé ostré složky "uploads"
app.upload.dir=uploads-test

spring.sql.init.mode=never